# SpectaQL configuration for the public TrainApp GraphQL contract.
# The schema is generated by NestJS. Do not edit src/schema.gql manually.

spectaql:
  displayAllServers: true
  targetDir: ./docs/generated/graphql

introspection:
  schemaFile: ./src/schema.gql

info:
  title: TrainApp GraphQL API
  description: Static reference documentation generated from the TrainApp GraphQL schema.
  version: 0.0.1

servers:
  - url: http://localhost:3000/graphql
    description: Local development GraphQL endpoint
